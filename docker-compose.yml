services:
  dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "4200:4200"
    command: sh -c "npm ci && npm start -- --host 0.0.0.0 --poll 500"
    environment:
      - NODE_ENV=development

  prod:
    build:
      context: .
      target: production
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production

volumes:
  node_modules:
